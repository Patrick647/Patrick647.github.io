bio: |
  I am a clinical pharmacist and early-career researcher working at the intersection of pharmacy practice, health services research, and clinical informatics. I currently serve as a Clinical Trial Quality Assurance Officer at Affiliated Women's Hospital of Jiangnan University (Jiangnan University Affiliated Maternity and Child Healthcare Hospital), while also contributing to pharmacy policy and professional coordination through the Wuxi Pharmacists Association.

  My research agenda focuses on pharmacist competency development, patient-centered pharmaceutical care, drug information visualization, and AI-assisted pharmacovigilance. I am particularly interested in how real-world clinical workflows can be translated into scalable, evaluable interventions that improve medication safety, communication quality, and implementation feasibility.

  As a practice-based example of this approach, I contributed to the "Drug Package Insert Reform & Visualization Project" (2020–2025), which developed more than 150 visualized medication instruction videos and reached over 850,000 patients. This work informed local pharmaceutical science communication infrastructure and supported recognition as one of the first Jiangsu Pharmaceutical Association "Pharmacy Science Popularization Base" sites (April 2024).

  My current working papers, under review at *Drug Safety* and *JAMIA*, examine adverse drug reaction detection and reporting from clinical instant messaging using hybrid NLP and confidence-calibrated LLM pipelines. In the long term, I aim to develop rigorous yet implementable methods that connect clinical pharmacy practice, digital health tools, and health system decision-making.

