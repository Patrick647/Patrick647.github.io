bio: |
  I am a clinical pharmacist and early-career researcher working at the intersection of pharmacy practice, clinical informatics, and implementation-oriented AI. I currently serve as a Clinical Trial Quality Assurance Officer at Affiliated Women's Hospital of Jiangnan University (Jiangnan University Affiliated Maternity and Child Healthcare Hospital), while building digital systems for medication safety, pharmacist workflow automation, and clinical pharmacy training.

  My current platform portfolio includes an ADR intelligent reporting system, a clinical pharmacist workstation, and a clinical pharmacist training base. These systems combine hospital data integration, rule engines, LLM-assisted extraction, confidence scoring, pharmacist review, pharmacokinetic calculation, and document-grade export workflows.

  My ADR reporting work now includes an SSRN preprint and current manuscripts under review at *Drug Safety* and *JAMIA*, examining adverse drug reaction detection and reporting from clinical instant messaging using hybrid NLP and confidence-calibrated LLM pipelines. My published work on pharmacist competency evaluation supports the education-management logic behind the training-base platform.

  Earlier, I contributed to the "Drug Package Insert Reform & Visualization Project" (2020–2025), which developed more than 150 visualized medication instruction videos and reached over 850,000 patients. I now treat that science-communication work as a foundation for a broader goal: building rigorous yet implementable clinical pharmacy infrastructure.

